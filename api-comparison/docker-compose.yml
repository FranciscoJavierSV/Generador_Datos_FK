services:
  api:
    build: .
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - DB_NAME=${DB_NAME:-baseDR}
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - basedr_backend


volumes:
  api_logs:
    driver: local

networks:
  basedr_backend:
    external: true

