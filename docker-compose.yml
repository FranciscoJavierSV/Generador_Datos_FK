# ORQUESTADOR PRINCIPAL: Kafka, Consumer, Prometheus, Grafana
# seed_app se ejecuta manual: docker-compose run seed_app

services:
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_LOG_MESSAGE_MAX_BYTES: '${KAFKA_LOG_MESSAGE_MAX_BYTES}'
      KAFKA_REPLICA_FETCH_MAX_BYTES: '${KAFKA_REPLICA_FETCH_MAX_BYTES}'
      KAFKA_MESSAGE_MAX_BYTES: '${KAFKA_LOG_MESSAGE_MAX_BYTES}'
    ports:
      - '9092:9092'
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # NOTA: seed_app no se inicia automáticamente
  # Ejecutar manualmente: docker-compose run seed_app

  consumer:
    build:
      context: ./data-ingestion
    env_file: .env
    environment:
      - MONGO_URI=mongodb://appuser:T9%23kL2%40vQ8!mX4%24Rs7%5EWp1%26Zc5Yh3N@host.docker.internal:27018/baseDR?authSource=baseDR
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - KAFKA_GROUP_ID=${KAFKA_GROUP_ID}
      - CONSUMER_BATCH_SIZE=${CONSUMER_BATCH_SIZE}
      - METRICS_PORT=9464
    command: ["node", "src/kafka/consumer.js"]
    ports:
      - "9464:9464"
    depends_on:
      - kafka
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  seed_app:
    build: ./data-ingestion
    profiles:
      - seed
    env_file: .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - SEED_N=${SEED_N}
      - SEED_BATCH=${SEED_BATCH}
      - SEED_WORKERS=${SEED_WORKERS}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
    command: ["node", "src/seeders/seed_all.js"]
    depends_on:
      - kafka
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  kafka_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

