name: Seed MongoDB

on:
  workflow_dispatch:

jobs:
  build-and-seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Show commit
        run: git log -1 --oneline

      - name: Create .env for Docker Compose
        run: |
          cat > .env <<'EOF'
          MONGO_URI=${{ secrets.MONGO_URI }}
          SEED_N=${{ secrets.SEED_N }}
          SEED_BATCH=${{ secrets.SEED_BATCH }}
          SEED_WORKERS=${{ secrets.SEED_WORKERS }}
          KAFKA_BROKERS=kafka:9092
          KAFKA_TOPIC=productos
          KAFKA_GROUP_ID=mongo-inserter
          EOF

      - name: Start Kafka & Zookeeper
        run: |
          docker compose -f docker-compose.yml up -d
          # wait for broker to be ready (inside kafka container)
          timeout 120 bash -c 'until docker compose exec kafka bash -c "kafka-topics --bootstrap-server kafka:9092 --list" >/dev/null 2>&1; do sleep 2; done'


      - name: Build Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: false
          tags: base-dr-seeder:latest
          no-cache: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}

      - name: Inspect built image
        run: |
          echo "--- Inspecting built image for debug strings ---"
          # Print presence of our diagnostic log and head of worker file and seed_all inside the image
          docker run --rm base-dr-seeder:latest sh -c \
            "grep -n 'Parámetros recibidos' /app/src/**/*.js || true; echo '--- worker file head ---'; sed -n '1,200p' /app/src/workers/worker_seed_clientes.js || true; echo '--- seed_all head ---'; sed -n '1,200p' /app/src/seeders/seed_all.js || true"

      - name: Run seeder
        run: |
          docker run --rm \
            -e MONGO_URI="${{ secrets.MONGO_URI }}" \
            -e SEED_N="${{ secrets.SEED_N }}" \
            -e SEED_N_CLIENTES="${{ secrets.SEED_N_CLIENTES }}" \
            -e SEED_N_PRODUCTOS="${{ secrets.SEED_N_PRODUCTOS }}" \
            -e SEED_N_FACTURAS="${{ secrets.SEED_N_FACTURAS }}" \
            -e SEED_BATCH="${{ secrets.SEED_BATCH }}" \
            -e SEED_WORKERS="${{ secrets.SEED_WORKERS }}" \
            base-dr-seeder:latest

      - name: Smoke-test Kafka producers/consumers
        continue-on-error: true
        run: |
          docker compose exec seed_app node src/kafka/consumer.js &
          sleep 5
          docker compose exec seed_app node src/kafka/producer.js

