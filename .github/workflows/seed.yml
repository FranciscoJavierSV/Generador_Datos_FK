name: Seed MongoDB

on:
  workflow_dispatch:

jobs:
  build-and-seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Show commit
        run: git log -1 --oneline

      - name: Create .env for Docker Compose
        run: |
          cat > .env <<'EOF'
          MONGO_URI=${{ secrets.MONGO_URI }}
          SEED_N=${{ secrets.SEED_N }}
          SEED_BATCH=${{ secrets.SEED_BATCH }}
          SEED_WORKERS=${{ secrets.SEED_WORKERS }}
          KAFKA_BROKERS=kafka:9092
          KAFKA_TOPIC=productos
          KAFKA_GROUP_ID=mongo-inserter
          EOF

      - name: Start Kafka, Zookeeper, Mongo
        run: |
          docker compose -f docker-compose.yml up -d zookeeper kafka mongo
          echo "Esperando servicio mongo..."
          timeout 180 bash -c 'until docker compose exec mongo mongosh --eval "db.adminCommand(\"ping\")" >/dev/null 2>&1; do sleep 3; done'
          echo "Esperando servicio kafka..."
          timeout 180 bash -c 'until docker compose exec kafka bash -lc "kafka-topics --bootstrap-server kafka:9092 --list 2>/dev/null" >/dev/null 2>&1; do sleep 3; done'

      - name: Run seeder as Compose service
        run: |
          docker compose -f docker-compose.yml run --rm seed_app node src/seeders/seed_all.js

      - name: Start consumer for Kafka metrics
        run: |
          docker compose -f docker-compose.yml up -d consumer
          sleep 10

      - name: Run producer to generate messages for consumer
        run: |
          docker compose -f docker-compose.yml run --rm producer
          sleep 10

      - name: Show consumer Prometheus metrics
        run: |
          echo "--- Consumer Prometheus metrics ---"
          curl -s http://localhost:9464/metrics | grep -E 'consumer_messages_total|consumer_errors_total|consumer_latency_ms|process_cpu_user_seconds_total|process_resident_memory_bytes' || true
          echo "--- Consumer logs summary ---"
          docker compose -f docker-compose.yml logs --tail=100 consumer

      - name: Show final Mongo counts from MONGO_URI
        run: |
          echo "--- Mongo counts from ${MONGO_URI} ---"
          docker run --rm mongo:6.0 mongosh "${{ secrets.MONGO_URI }}" --quiet --eval "const db = db.getSiblingDB('test'); print('clientes', db.clientes.countDocuments()); print('productos', db.productos.countDocuments()); print('variaciones', db.variaciones.countDocuments()); print('facturas', db.facturas.countDocuments()); print('datosfactura', db.datosfactura.countDocuments());"

      - name: Shutdown compose
        run: |
          docker compose -f docker-compose.yml down

